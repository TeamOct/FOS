name: Testing

on: [push, pull_request, workflow_dispatch]

jobs:
  buildJar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 20
        uses: actions/setup-java@v4
        with:
          java-version: 20
          distribution: temurin
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0'
      - name: Configure local.json
        run: |
          mkdir -p settings
          printf '%s\n' '{"offlineMode":false,"autoOfflineMode":false}' | tee "settings/local.json"
      - name: Build mod artifact
        run: |
          chmod +x gradlew
          ./gradlew clean nmpBuildRelease
      - name: Upload built mod artifact
        uses: actions/upload-artifact@v4
        with:
          name: FOS (zipped)
          path: build/libs/*.jar
