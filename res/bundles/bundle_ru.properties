unit.fos-legion.name = \u041B\u0435\u0433\u0438\u043E\u043D
unit.fos-legion.description = \u0414\u0440\u0435\u0432\u043D\u0438\u0439 \u043F\u0440\u043E\u0442\u043E\u0442\u0438\u043F \u0431\u043E\u0435\u0432\u043E\u0439 \u0435\u0434\u0438\u043D\u0438\u0446\u044B, \u0441\u043E\u0437\u0434\u0430\u044E\u0449\u0435\u0439 \u0434\u0440\u0443\u0433\u0438\u0445 \u0435\u0434\u0438\u043D\u0438\u0446 \u0438 \u0443\u043F\u0440\u0430\u0432\u043B\u044F\u044E\u0449\u0435\u0439 \u0438\u043C\u0438. \u041D\u0435\u0441\u043C\u043E\u0442\u0440\u044F \u043D\u0430 \u0442\u043E, \u0447\u0442\u043E \u043E\u043D \u043F\u043E\u043B\u043D\u043E\u0441\u0442\u044C\u044E \u043C\u0435\u0445\u0430\u043D\u0438\u0447\u0435\u0441\u043A\u0438\u0439, \u043E\u043D \u043A\u0430\u043A\u0438\u043C-\u0442\u043E \u043E\u0431\u0440\u0430\u0437\u043E\u043C \u0431\u044B\u043B \u0437\u0430\u0445\u0432\u0430\u0447\u0435\u043D \u043F\u0440\u0438\u0440\u043E\u0434\u043E\u0439 \u041B\u044E\u043C\u043E\u043D\u0438 \u0434\u043B\u044F \u0437\u0430\u0449\u0438\u0442\u044B \u043E\u0434\u043D\u043E\u0433\u043E \u0433\u043D\u0435\u0437\u0434\u0430.\n\u0421\u043E\u0437\u0434\u0430\u0435\u0442 [accent]\u041B\u0435\u0433\u0438\u043E\u043D\u0435\u0440\u043E\u0432[] \u043D\u0430 \u0441\u0432\u043E\u0435\u0439 \u0441\u0442\u043E\u0440\u043E\u043D\u0435, \u043A\u043E\u0442\u043E\u0440\u044B\u0435 \u0430\u0442\u0430\u043A\u0443\u044E\u0442 \u0446\u0435\u043B\u0438 \u041B\u0435\u0433\u0438\u043E\u043D\u0430. \u041A\u0430\u0436\u0434\u044B\u0439 \u0444\u0443\u043D\u043A\u0446\u0438\u043E\u043D\u0438\u0440\u0443\u044E\u0449\u0438\u0439 \u041B\u0435\u0433\u0438\u043E\u043D\u0435\u0440 \u0434\u0430\u0435\u0442 \u041B\u0435\u0433\u0438\u043E\u043D\u0443 \u0443\u0441\u0442\u043E\u0439\u0447\u0438\u0432\u043E\u0441\u0442\u044C \u043A\u043E \u0432\u0441\u0435\u043C\u0443 \u0443\u0440\u043E\u043D\u0443.
