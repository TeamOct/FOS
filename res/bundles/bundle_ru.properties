block.fos-judge1.description = \u041E\u0434\u0438\u043D \u0438\u0437 \u0442\u0435\u0441\u0442\u043E\u0432\u044B\u0445 \u043F\u0440\u043E\u0442\u043E\u0442\u0438\u043F\u043E\u0432 \u0442\u0443\u0440\u0435\u043B\u0438 \u0441 \u043B\u0443\u0447\u043E\u043C \u0441\u043C\u0435\u0440\u0442\u0438.\n\n\u0412\u044B\u0441\u0442\u0440\u0435\u043B\u0438\u0432\u0430\u0435\u0442 \u0433\u0438\u0433\u0430\u043D\u0442\u0441\u043A\u0438\u043C \u043B\u0443\u0447\u043E\u043C \u0441\u043C\u0435\u0440\u0442\u0438, \u043A\u043E\u0442\u043E\u0440\u044B\u0439 \u043D\u0430\u043F\u0440\u0430\u0432\u043B\u0435\u043D \u043D\u0430 \u0432\u0440\u0430\u0436\u0435\u0441\u043A\u0443\u044E \u0446\u0435\u043B\u044C \u0438 \u043F\u043B\u0430\u0432\u044F\u0449\u0438\u0439 \u0432\u0441\u0451, \u0447\u0442\u043E \u0435\u0433\u043E \u043A\u043E\u0441\u043D\u0435\u0442\u0441\u044F.\n\u041B\u0443\u0447 \u0431\u0443\u0434\u0435\u0442 \u043F\u0440\u043E\u0434\u043E\u043B\u0436\u0438\u0442\u0435\u043B\u044C\u043D\u043E \u0432\u044B\u0441\u0442\u0440\u0435\u043B\u0438\u0432\u0430\u0442\u044C\u0441\u044F \u0434\u043E \u0442\u0435\u0445 \u043F\u043E\u0440, \u043F\u043E\u043A\u0430 \u0443 \u0442\u0443\u0440\u0435\u043B\u0438 \u043D\u0435 \u043E\u0441\u0442\u0430\u043D\u0435\u0442\u0441\u044F \u0446\u0435\u043B\u0435\u0439, \u044D\u043D\u0435\u0440\u0433\u0438\u0438 \u0438\u043B\u0438 \u0445\u043B\u0430\u0434\u0430\u0433\u0435\u043D\u0442\u0430. \u041F\u043E\u0441\u043B\u0435 \u044D\u0442\u043E\u0433\u043E \u0442\u0443\u0440\u0435\u043B\u0438 \u0442\u0440\u0435\u0431\u0443\u0435\u0442\u0441\u044F \u0432\u0440\u0435\u043C\u044F \u043D\u0430 \u043E\u0445\u043B\u0430\u0436\u0434\u0435\u043D\u0438\u0435.\n\u0422\u0440\u0435\u0431\u0443\u0435\u0442 \u043D\u0435\u0432\u0435\u0440\u043E\u044F\u0442\u043D\u043E\u0435 \u043A\u043E\u043B\u0438\u0447\u0435\u0441\u0442\u0432\u043E \u044D\u043D\u0435\u0440\u0433\u0438\u0438 \u0438 \u0445\u043B\u0430\u0434\u0430\u0433\u0435\u043D\u0442\u0430 \u0434\u043B\u044F \u0440\u0430\u0431\u043E\u0442\u044B.\n[red]\u041E\u0421\u0422\u041E\u0420\u041E\u0416\u041D\u041E: \u041E\u0413\u041E\u041D\u042C \u041C\u041E\u0416\u0415\u0422 \u041D\u0410\u041D\u0415\u0421\u0422\u0418 \u0423\u0429\u0415\u0420\u0411 \u0421\u041E\u042E\u0417\u041D\u042B\u041C \u041F\u041E\u0421\u0422\u0420\u041E\u0419\u041A\u0410\u041C, \u041D\u0415 \u041D\u0410\u0426\u0415\u041B\u0418\u0412\u0410\u0419\u0422\u0415 \u041D\u0410 \u0412\u041E\u0421\u041F\u041B\u0410\u041C\u0415\u041D\u042F\u0415\u041C\u042B\u0415 \u041F\u0420\u0415\u0414\u041C\u0415\u0422\u042B![]
block.fos-judge2.name = \u0410\u0440\u0431\u0438\u0442\u0440: \u041F\u0440\u043E\u0442\u043E\u0442\u0438\u043F #2
block.fos-judge2.description = \u041E\u0434\u0438\u043D \u0438\u0437 \u0442\u0435\u0441\u0442\u043E\u0432\u044B\u0445 \u043F\u0440\u043E\u0442\u043E\u0442\u0438\u043F\u043E\u0432 \u0442\u0443\u0440\u0435\u043B\u0438 \u0441 \u043B\u0443\u0447\u043E\u043C \u0441\u043C\u0435\u0440\u0442\u0438.\n\n\u0412\u044B\u0441\u0442\u0440\u0435\u043B\u0438\u0432\u0430\u0435\u0442 \u0433\u0438\u0433\u0430\u043D\u0442\u0441\u043A\u0438\u043C \u043B\u0443\u0447\u043E\u043C \u0441\u043C\u0435\u0440\u0442\u0438, \u043A\u043E\u0442\u043E\u0440\u044B\u0439 \u043D\u0430\u043F\u0440\u0430\u0432\u043B\u0435\u043D \u043D\u0430 \u0432\u0440\u0430\u0436\u0435\u0441\u043A\u0443\u044E \u0446\u0435\u043B\u044C \u0438 \u043F\u043B\u0430\u0432\u044F\u0449\u0438\u0439 \u0432\u0441\u0451, \u0447\u0442\u043E \u0435\u0433\u043E \u043A\u043E\u0441\u043D\u0435\u0442\u0441\u044F.\n\u0422\u0443\u0440\u0435\u043B\u044C \u0438\u0449\u0435\u0442 \u0446\u0435\u043B\u044C \u0438 \u0432\u044B\u0441\u0442\u0440\u0435\u043B\u0438\u0432\u0430\u0435\u0442 \u043B\u0443\u0447\u043E\u043C, \u043A\u043E\u0433\u0434\u0430 \u043A\u0440\u0443\u0433 \u043F\u0440\u0438\u0446\u0435\u043B\u0438\u0432\u0430\u043D\u0438\u044F \u043D\u0430\u0445\u043E\u0434\u0438\u0442\u0441\u044F \u0432 \u043F\u043E\u0437\u0438\u0446\u0438\u0438 \u0446\u0435\u043B\u0438. \u041F\u043E\u0441\u043B\u0435 \u0443\u043D\u0438\u0447\u0442\u043E\u0436\u0435\u043D\u0438\u044F \u0446\u0435\u043B\u0438 \u0442\u0443\u0440\u0435\u043B\u044C \u043F\u0440\u0438\u043E\u0441\u0442\u0430\u043D\u0430\u0432\u043B\u0438\u0432\u0430\u0435\u0442 \u043B\u0443\u0447, \u0441\u043E\u0445\u0440\u0430\u043D\u044F\u044F \u044D\u043D\u0435\u0440\u0433\u0438\u044E \u0438 \u0445\u043B\u0430\u0434\u0430\u0433\u0435\u043D\u0442, \u0438 \u0438\u0449\u0435\u0442 \u043D\u043E\u0432\u044B\u0435 \u0446\u0435\u043B\u0438. \u0423 \u043B\u0443\u0447\u0430 \u043E\u0433\u0440\u0430\u043D\u0438\u0447\u0435\u043D\u0430 \u0437\u0430\u0440\u044F\u0434\u043A\u0430.\n\u0422\u0440\u0435\u0431\u0443\u0435\u0442 \u043D\u0435\u0432\u0435\u0440\u043E\u044F\u0442\u043D\u043E\u0435 \u043A\u043E\u043B\u0438\u0447\u0435\u0441\u0442\u0432\u043E \u044D\u043D\u0435\u0440\u0433\u0438\u0438 \u0438 \u043A\u0440\u0438\u043E\u0433\u0435\u043D\u043D\u043E\u0439 \u0436\u0438\u0434\u043A\u043E\u0441\u0442\u0438 \u0434\u043B\u044F \u0440\u0430\u0431\u043E\u0442\u044B.\n[red]\u041E\u0421\u0422\u041E\u0420\u041E\u0416\u041D\u041E: \u041E\u0413\u041E\u041D\u042C \u041C\u041E\u0416\u0415\u0422 \u041D\u0410\u041D\u0415\u0421\u0422\u0418 \u0423\u0429\u0415\u0420\u0411 \u0421\u041E\u042E\u0417\u041D\u042B\u041C \u041F\u041E\u0421\u0422\u0420\u041E\u0419\u041A\u0410\u041C, \u041D\u0415 \u041D\u0410\u0426\u0415\u041B\u0418\u0412\u0410\u0419\u0422\u0415 \u041D\u0410 \u0412\u041E\u0421\u041F\u041B\u0410\u041C\u0415\u041D\u042F\u0415\u041C\u042B\u0415 \u041F\u0420\u0415\u0414\u041C\u0415\u0422\u042B![]
